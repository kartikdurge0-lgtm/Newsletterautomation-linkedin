name: Send Weekly Pharma Brief

on:
  workflow_dispatch:
  schedule:
    - cron: "5 4 * * 1"

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write Gmail env file from secrets
        run: |
          cat > .env.gmail <<EOF
          GMAIL_SMTP_EMAIL='${{ secrets.GMAIL_SMTP_EMAIL }}'
          GMAIL_APP_PASSWORD='${{ secrets.GMAIL_APP_PASSWORD }}'
          REPLY_TO='${{ secrets.REPLY_TO }}'
          RECIPIENT='${{ secrets.RECIPIENT }}'
          FROM_NAME='${{ secrets.FROM_NAME }}'
          EOF

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.GMAIL_SMTP_EMAIL }}" ]; then
            echo "::error::Missing repository secret GMAIL_SMTP_EMAIL"
            missing=1
          fi
          if [ -z "${{ secrets.GMAIL_APP_PASSWORD }}" ]; then
            echo "::error::Missing repository secret GMAIL_APP_PASSWORD"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Send latest weekly brief
        env:
          RECIPIENT: ${{ secrets.RECIPIENT }}
          REPLY_TO: ${{ secrets.REPLY_TO }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
        run: |
          echo "Repo files matching weekly brief:"
          ls -1 *_onyx_analytix_weekly_commercial_pharma_brief.* || true
          echo
          echo "Dry-run sender:"
          sh send_latest_brief.sh --dry-run
          echo
          echo "Actual send:"
          sh send_latest_brief.sh
